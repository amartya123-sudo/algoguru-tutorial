id: lesson02

title: Load an Image Dataset

difficulty: Beginner

estimated_time: 5

objective: >
  Learn how to load a built-in image dataset using torchvision.datasets.

concept: |
  torchvision.datasets provides ready-made datasets like MNIST, FashionMNIST,
  CIFAR10, and KMNIST that download and load automatically.

  Example:

      dataset = datasets.CIFAR10(root="data", train=True, download=True, transform=transform)

instructions:
  - Import one of MNIST, FashionMNIST, CIFAR10, or KMNIST from torchvision.datasets.
  - Create a variable named 'dataset' using that class.
  - Use the provided transform.

hint: >
  Use datasets.CIFAR10(), datasets.MNIST(), datasets.FashionMNIST(), or datasets.KMNIST()

success_message: >
  Great! The dataset has been loaded successfully.

