version: "3.9"

services:

  api:
    build: .
    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

    restart: unless-stopped

    ports:
      - "8000:8000"

    depends_on:
      - redis

  worker:
    build: .
    command:
      - python
      - -m
      - app.workers.execution

    restart: unless-stopped

    depends_on:
      - redis

  redis:
    image: redis:7-alpine

    restart: unless-stopped

    volumes:
      - redis-data:/data

volumes:
  redis-data: