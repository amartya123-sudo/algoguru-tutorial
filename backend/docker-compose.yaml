version: "3.9"

services:

  api:
    build: .
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8000:8000"

    depends_on:
      - redis

  worker:
    build: .
    command: ["python", "-m", "app.workers.execution"]

    depends_on:
      - redis

  redis:
    image: redis:7